<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 60">
    <rect fill="#AED1CA" width="99" height="58" x="1" y="1"/>
    <rect fill="#E1D2B6" width="96" height="56" x="2" y="2"/>

    <g id="shading" fill="#c1a187">
        <rect width="1" height="54" x="3" y="3"/>
        <rect width="95" height="1" x="3" y="3"/>
        <rect width="1" height="56" x="96" y="2"/>
        <rect width="95" height="1" x="3" y="56"/>

        <rect width="5" height="54" x="48" y="4"/>
    </g>

    <g id="border" fill="#584753">
        <rect width="1" height="58" x="0" y="1"/>
        <rect width="98" height="1" x="1"/>
        <rect width="1" height="58" x="99" y="1"/>
        <rect width="98" height="1" x="1" y="59"/>

        <rect width="1" height="56" x="2" y="2"/>
        <rect width="95" height="1" x="3" y="2"/>
        <rect width="1" height="56" x="97" y="2"/>
        <rect width="95" height="1" x="3" y="57"/>

        <rect width="1" height="60" x="50"/>
    </g>

    <g id="binder" transform="translate(47,6)">
        <g id="ring">
            <rect width="1" height="1" fill="#584753" y="1"/>
            <rect width="1" height="1" fill="#584753" y="1" x="6"/>
            <rect width="5" height="1" fill="#584753" x="1"/>
            <rect width="5" height="1" fill="#584753" y="2" x="1"/>
            <rect width="5" height="1" fill="#FCFBF8" y="1" x="1"/>
        </g>
        <use xlink:href="#ring" transform="translate(0,5)"/>
        <use xlink:href="#ring" transform="translate(0,10)"/>
        <use xlink:href="#ring" transform="translate(0,15)"/>
        <use xlink:href="#ring" transform="translate(0,20)"/>
        <use xlink:href="#ring" transform="translate(0,25)"/>
        <use xlink:href="#ring" transform="translate(0,30)"/>
        <use xlink:href="#ring" transform="translate(0,35)"/>
        <use xlink:href="#ring" transform="translate(0,40)"/>
        <use xlink:href="#ring" transform="translate(0,45)"/>
    </g>
</svg>